<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
  </defs>
  <!-- Background Circle with Soft Border -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="12" />
  
  <!-- Stylized Letter 'S' representing stationery (resembling a creative ribbon/pen stroke) -->
  <path d="M340,165 
           C340,120 290,110 256,110 
           C200,110 170,140 170,180 
           C170,240 342,230 342,300 
           C342,350 300,390 256,390 
           C190,390 165,350 165,310" 
        fill="none" 
        stroke="url(#goldGrad)" 
        stroke-width="44" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Small creative pen-nib highlight -->
  <polygon points="340,165 315,190 365,190" fill="url(#goldGrad)" />
</svg>
